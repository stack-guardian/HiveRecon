services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-gsk_PLACEHOLDER_replace_with_your_key}
      DATABASE_URL: sqlite+aiosqlite:////app/data/hiverecon.db
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
    networks:
      - hiverecon-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  hiverecon-net:
