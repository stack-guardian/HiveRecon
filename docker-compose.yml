services:
  app:
    build:
      context: .
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DATABASE_URL: sqlite+aiosqlite:///./hiverecon.db
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
    networks:
      - hiverecon-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  hiverecon-net:
